name: ponymail
description: "🐴 PonyMail - A beautiful cross-platform email client for macOS, Windows, iOS & Android. Built with Flutter."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  enough_mail: ^2.1.6
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  drift: ^2.24.0
  sqlite3_flutter_libs: ^0.5.30
  path_provider: ^2.1.5
  path: ^1.9.1
  flutter_secure_storage: ^9.2.4
  flutter_widget_from_html: ^0.16.0
  flutter_local_notifications: ^18.0.1
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  file_picker: ^8.1.6
  open_filex: ^4.5.0
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.3
  drift_dev: ^2.24.0

flutter:
  uses-material-design: true
