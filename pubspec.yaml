name: ponymail
description: "PonyMail - A beautiful cross-platform email client for macOS, Windows, iOS & Android. Built with Flutter."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  enough_mail: ^2.1.6
  flutter_riverpod: ^3.2.1
  go_router: ^17.1.0
  drift: ^2.24.0
  sqlite3_flutter_libs: ^0.6.0+eol
  path_provider: ^2.1.5
  path: ^1.9.1
  flutter_secure_storage: ^10.0.0
  flutter_widget_from_html: ^0.17.1
  flutter_local_notifications: ^21.0.0
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  file_picker: ^10.3.10
  open_filex: ^4.5.0
  share_plus: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  freezed: ^3.2.5
  json_serializable: ^6.9.3
  drift_dev: ^2.24.0

flutter:
  uses-material-design: true
  generate: true
